name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Lint affected projects
        run: bunx nx affected -t lint --parallel=3

      # - name: Test affected projects
      #   run: bunx nx affected -t test --parallel=3

      - name: Build deployable apps
        run: bunx nx run-many -t build -p cacic-eventos,events-backend,public --configuration=production --parallel=1
